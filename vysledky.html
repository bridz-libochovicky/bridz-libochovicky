<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Výsledky – Bridžový klub Libochovičky</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-title">Bridžový klub Libochovičky</div>
      <div class="logo-sub">Klub přátel bridže</div>
    </div>
    <nav>
      <a href="index.html">Úvod</a>
      <a href="prihlasky.html">Přihlášky</a>
      <a href="vysledky.html" class="active">Výsledky</a>
    </nav>
  </div>
</header>

<main>
  <h1 class="page-title">Výsledky turnajů</h1>
  <div class="page-title-rule"></div>

  <div class="card" id="results-card">
    <table class="tournament-table">
      <thead>
        <tr>
          <th>Datum</th>
          <th>Soubory</th>
        </tr>
      </thead>
      <tbody id="results-body">
        <tr><td colspan="2" style="color: var(--text-muted); font-size: 0.9rem;">Načítání výsledků…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="archive-section" id="archive-section" style="display:none;">
    <h3>Archiv</h3>
    <p style="font-size:0.9rem; color: var(--text-muted); margin-bottom: 1rem;">
      Starší výsledky jsou k dispozici jako souhrnné soubory ke stažení.
    </p>
    <div id="archive-links"></div>
  </div>
</main>

<footer>
  &copy; Bridžový klub Libochovičky
</footer>

<script>
const GITHUB_USER   = "bridz-libochovicky";
const GITHUB_REPO   = "bridz-libochovicky";
const GITHUB_BRANCH = "main";
const RESULTS_FOLDER = "vysledky";
const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}`;
const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents`;

// Keyword → label mapping. First match wins.
const FILE_LABELS = [
  { keywords: ["zapis"],             label: "Záp. listy", icon: "scan"  },
  { keywords: ["vysledk"],           label: "Výsledky",   icon: "text"  },
  { keywords: ["rozdan"],            label: "Rozdání",    icon: "cards" },
];

function labelForFile(filename) {
  const lower = filename.toLowerCase();
  for (const rule of FILE_LABELS) {
    if (rule.keywords.some(k => lower.includes(k))) {
      return { label: rule.label, icon: rule.icon };
    }
  }
  // Fallback: use filename without extension
  return { label: filename.replace(/\.[^.]+$/, ""), icon: "file" };
}

function fileIcon(type) {
  const icons = {
    scan:  `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 2H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V6L9 2z"/><path d="M9 2v4h4"/></svg>`,
    text:  `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 2H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V6L9 2z"/><path d="M9 2v4h4"/><line x1="5" y1="9" x2="11" y2="9"/><line x1="5" y1="12" x2="9" y2="12"/></svg>`,
    cards: `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="9" height="11" rx="1"/><path d="M5 4V3a1 1 0 0 1 1-1h7a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1h-1"/></svg>`,
    zip:   `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="1" width="10" height="14" rx="1"/><line x1="6" y1="4" x2="10" y2="4"/><line x1="6" y1="7" x2="10" y2="7"/><line x1="6" y1="10" x2="8" y2="10"/></svg>`,
    file:  `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 2H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V6L9 2z"/><path d="M9 2v4h4"/></svg>`,
  };
  return icons[type] || icons.file;
}

function folderToDate(name) {
  const m = name.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return name;
  const months = ["ledna","února","března","dubna","května","června",
                  "července","srpna","září","října","listopadu","prosince"];
  const d = parseInt(m[3], 10);
  const mo = months[parseInt(m[2], 10) - 1];
  const y = m[1];
  return `${d}.\u00a0${mo}\u00a0${y}`;
}

function isDateFolder(name) {
  return /^\d{4}-\d{2}-\d{2}$/.test(name);
}

async function fetchJSON(url) {
  const res = await fetch(url, { headers: { Accept: "application/vnd.github+json" } });
  if (!res.ok) throw new Error(`GitHub API chyba: ${res.status}`);
  return res.json();
}

async function loadResults() {
  const tbody = document.getElementById("results-body");
  try {
    const topItems = await fetchJSON(`${API_BASE}/${RESULTS_FOLDER}`);

    const dateFolders = topItems
      .filter(i => i.type === "dir" && isDateFolder(i.name))
      .sort((a, b) => b.name.localeCompare(a.name));

    const archiveFolderExists = topItems.some(i => i.type === "dir" && i.name === "archiv");

    if (dateFolders.length === 0) {
      tbody.innerHTML = `<tr><td colspan="2" style="color:var(--text-muted);font-size:.9rem;">Zatím žádné výsledky.</td></tr>`;
      return;
    }

    // Fetch all folder contents in parallel
    const folderContents = await Promise.all(
      dateFolders.map(f => fetchJSON(`${API_BASE}/${RESULTS_FOLDER}/${f.name}`))
    );

    tbody.innerHTML = "";
    dateFolders.forEach((folder, i) => {
      const files = folderContents[i].filter(f => f.type === "file");
      const tr = document.createElement("tr");

      const dateCell = document.createElement("td");
      dateCell.textContent = folderToDate(folder.name);
      tr.appendChild(dateCell);

      const filesCell = document.createElement("td");
      files.forEach(file => {
        const { label, icon } = labelForFile(file.name);
        const a = document.createElement("a");
        a.className = "file-link";
        a.href = `${RAW_BASE}/${RESULTS_FOLDER}/${folder.name}/${encodeURIComponent(file.name)}`;
        a.target = "_blank";
        a.rel = "noopener";
        a.innerHTML = `${fileIcon(icon)} ${label}`;
        filesCell.appendChild(a);
      });
      tr.appendChild(filesCell);
      tbody.appendChild(tr);
    });

    // Archive section
    if (archiveFolderExists) {
      const archiveItems = await fetchJSON(`${API_BASE}/${RESULTS_FOLDER}/archiv`);
      const zips = archiveItems.filter(f => f.type === "file" && f.name.toLowerCase().endsWith(".zip"));
      if (zips.length > 0) {
        document.getElementById("archive-section").style.display = "";
        const linksDiv = document.getElementById("archive-links");
        zips.sort((a, b) => b.name.localeCompare(a.name)).forEach(zip => {
          const a = document.createElement("a");
          a.className = "archive-link";
          a.href = `${RAW_BASE}/${RESULTS_FOLDER}/archiv/${encodeURIComponent(zip.name)}`;
          a.innerHTML = `${fileIcon("zip")} ${zip.name.replace(".zip","")} (ZIP)`;
          linksDiv.appendChild(a);
        });
      }
    }

  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="2" style="color:var(--text-muted);font-size:.9rem;">
      Výsledky se nepodařilo načíst. Zkuste obnovit stránku.<br>
      <small style="opacity:.6;">${err.message}</small>
    </td></tr>`;
  }
}

loadResults();
</script>

</body>
</html>
